<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance AI Chatbot</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .chat-container {
            width: 500px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        .header {
            text-align: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
            margin-bottom: 15px;
        }
        .header h2 { margin: 0; color: #2c3e50; }
        .header p { margin: 5px 0 0 0; color: #7f8c8d; font-size: 14px; }
        
        .chat-box {
            height: 400px;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 15px;
            line-height: 1.5;
            font-size: 15px;
        }
        .user-msg {
            background: #3498db;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }
        .bot-msg {
            background: #ecf0f1;
            color: #2c3e50;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }
        .sentiment-badge {
            font-size: 12px;
            font-weight: bold;
            color: #e67e22;
            display: block;
            margin-bottom: 5px;
            border-bottom: 1px solid #dcdde1;
            padding-bottom: 3px;
        }
        .input-area {
            display: flex;
            margin-top: 20px;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #bdc3c7;
            border-radius: 25px;
            outline: none;
            font-size: 15px;
        }
        input:focus { border-color: #3498db; }
        button {
            padding: 12px 25px;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover { background: #34495e; }
        
        /* Markdown formatting support */
        .bot-msg strong { color: #2980b9; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        <h2>MarketSentiment AI</h2>
        <p>Hybrid NLP + Gemini Financial Analyst</p>
    </div>
    
    <div class="chat-box" id="chat-box">
        <div class="message bot-msg">
            Hello! I am a financial domain chatbot. Ask me about market sentiment, specific stocks, or economic concepts (e.g., "Why is Nvidia dropping today?").
        </div>
    </div>
    
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Type your financial query..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }

    async function sendMessage() {
        const inputField = document.getElementById('user-input');
        const message = inputField.value.trim();
        if (!message) return;

        // Display User Message
        addMessage(message, 'user-msg');
        inputField.value = '';

        // Temporary Typing Indicator
        const typingId = "typing-" + Date.now();
        addMessage("Analyzing sentiment and querying Gemini...", 'bot-msg', null, typingId);

        try {
            // Send to Flask Backend
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message })
            });
            
            const data = await response.json();
            
            // Remove typing indicator
            document.getElementById(typingId).remove();
            
            // Format markdown bold (**text**) to HTML
            let formattedResponse = data.response.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            
            // Add bot message with sentiment badge
            addMessage(formattedResponse, 'bot-msg', data.sentiment);
            
        } catch (error) {
            document.getElementById(typingId).remove();
            addMessage('System Error: Unable to connect to backend API.', 'bot-msg');
            console.error(error);
        }
    }

    function addMessage(text, className, sentiment = null, id = null) {
        const chatBox = document.getElementById('chat-box');
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${className}`;
        if (id) msgDiv.id = id;
        
        let content = '';
        if (sentiment) {
            content += `<span class="sentiment-badge">Base Sentiment: ${sentiment}</span>`;
        }
        content += text;
        
        msgDiv.innerHTML = content;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
